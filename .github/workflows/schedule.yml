name: NiftyPulse Auto

on:
  schedule:
    # Morning run — 9:00 AM IST = 3:30 AM UTC — Mon to Fri
    - cron: '30 3 * * 1-5'
    # Afternoon run — 3:30 PM IST = 10:00 AM UTC — Mon to Fri
    - cron: '0 10 * * 1-5'
    # Weekly summary — Friday 4:00 PM IST = 10:30 AM UTC
    - cron: '30 10 * * 5'

  # Manual trigger always available
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type'
        required: true
        default: 'MORNING'
        type: choice
        options:
          - MORNING
          - AFTERNOON
          - WEEKLY

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "RUN_TYPE=${{ github.event.inputs.run_type }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            TIME="${HOUR}${MIN}"
            DOW=$(date -u +%u)
            echo "UTC time: ${HOUR}:${MIN} Day: ${DOW}"
            if [ "$TIME" -ge "0320" ] && [ "$TIME" -le "0400" ]; then
              echo "RUN_TYPE=MORNING" >> $GITHUB_ENV
            elif [ "$DOW" == "5" ] && [ "$TIME" -ge "1025" ] && [ "$TIME" -le "1045" ]; then
              echo "RUN_TYPE=WEEKLY" >> $GITHUB_ENV
            else
              echo "RUN_TYPE=AFTERNOON" >> $GITHUB_ENV
            fi
          fi
          echo "Final RUN_TYPE: $RUN_TYPE"

      - name: Run NiftyPulse
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          RUN_TYPE:          ${{ env.RUN_TYPE }}
        run: python main.py

      - name: Summary
        run: echo "✅ NiftyPulse ${{ env.RUN_TYPE }} complete — check Google Sheet"
